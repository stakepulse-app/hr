<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 StakePulse — High Rollers Live</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--bg:#080d12;--bg2:#0d1520;--bg3:#111d2a;--border:#1a2d3d;--text:#c8d8e8;--text2:#6a8a9a;--text3:#3a5a6a;--green:#00ff88;--amber:#ffd700;--orange:#ff8c00;--red:#ff3355;--blue:#00d4ff;--purple:#a855f7;}
[data-theme="light"]{--bg:#f0f4f8;--bg2:#fff;--bg3:#e8edf2;--border:#d0dae4;--text:#1a2a3a;--text2:#4a6a7a;--text3:#8aada8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(0,212,255,.04),transparent 60%);pointer-events:none;}
.lang-toggle{position:fixed;top:10px;right:10px;display:flex;gap:4px;z-index:200;}
.lang-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;cursor:pointer;transition:all .2s;}
.lang-btn.active{background:rgba(0,212,255,.15);border-color:var(--blue);color:var(--blue);}
.lang-btn:hover{border-color:var(--blue);color:var(--blue);}

.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:50;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-title{font-size:15px;font-weight:800;}
.header-sub{font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);padding:2px 8px;border-radius:4px;font-family:monospace;}
.btn{border:none;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .2s;}
.btn:hover{opacity:.8;}
.btn-blue{background:var(--blue);color:#000;}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.badge-live{background:rgba(0,255,136,.1);color:var(--green);font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;border:1px solid rgba(0,255,136,.3);display:flex;align-items:center;gap:5px;}
.badge-live::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);flex-shrink:0;}
.stat-box{background:var(--bg2);padding:10px 16px;text-align:center;}
.stat-value{font-size:20px;font-weight:800;font-family:monospace;}
.stat-label{font-size:10px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}

.filters{display:flex;align-items:center;gap:8px;padding:8px 1.5rem;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;}
.filter-select,.filter-input{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:12px;color:var(--text);outline:none;}
.filter-select:focus,.filter-input:focus{border-color:var(--blue);}
.filter-input{width:160px;}
.filter-label{font-size:11px;color:var(--text2);}

.chat-tabs{display:flex;gap:4px;flex-wrap:wrap;}
.chat-tab{padding:3px 9px;font-size:11px;border-radius:5px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:all .15s;}
.chat-tab.active{background:rgba(0,212,255,.15);border-color:var(--blue);color:var(--blue);}

.layout{display:grid;grid-template-columns:1fr 300px;gap:14px;padding:1.25rem 1.5rem;flex:1;overflow:hidden;min-height:0;}

.feed-panel{display:flex;flex-direction:column;gap:8px;overflow-y:auto;padding-right:4px;}
.feed-panel::-webkit-scrollbar{width:3px;}
.feed-panel::-webkit-scrollbar-thumb{background:var(--border);}

.section-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

.hr-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:12px;animation:slideIn .25s ease;transition:border-color .2s;}
.hr-card:hover{border-color:rgba(0,212,255,.3);}
.hr-card.new{animation:newBet .6s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
@keyframes newBet{0%{border-color:var(--green);box-shadow:0 0 15px rgba(0,255,136,.2)}100%{border-color:var(--border);box-shadow:none}}
.hr-idx{font-size:12px;font-weight:700;color:var(--text3);min-width:28px;text-align:center;padding-top:2px;}
.hr-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--blue);flex-shrink:0;border:1px solid var(--border);}
.hr-body{flex:1;min-width:0;}
.hr-name{font-size:14px;font-weight:700;}
.hr-msg{font-size:11px;color:var(--text2);margin-top:3px;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hr-meta{display:flex;align-items:center;gap:8px;margin-top:4px;}
.hr-chat-tag{font-size:10px;background:var(--bg3);border:1px solid var(--border);padding:1px 6px;border-radius:4px;color:var(--text2);}
.hr-time{font-size:10px;color:var(--text3);font-family:monospace;}
.hr-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;}
.hr-badge.recent{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3);}
.hr-badge.old{background:var(--bg3);color:var(--text3);border:1px solid var(--border);}

.empty{text-align:center;padding:3rem 2rem;color:var(--text2);}
.empty-icon{font-size:48px;margin-bottom:1rem;opacity:.5;}
.loader{display:flex;align-items:center;justify-content:center;padding:3rem;gap:10px;color:var(--text2);}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.sidebar-right{display:flex;flex-direction:column;gap:10px;overflow-y:auto;}
.sidebar-right::-webkit-scrollbar{width:3px;}
.sidebar-right::-webkit-scrollbar-thumb{background:var(--border);}

.widget{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;flex-shrink:0;}
.widget-header{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.widget-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;flex:1;}
.widget-sub{font-size:10px;color:var(--text2);}
.widget-body{padding:6px 0;}

.lb-row{display:flex;align-items:center;gap:8px;padding:6px 12px;transition:background .15s;}
.lb-row:hover{background:var(--bg3);}
.lb-rank{font-size:12px;font-weight:700;color:var(--text2);min-width:20px;text-align:center;}
.lb-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-val{font-size:12px;font-weight:700;color:var(--blue);font-family:monospace;}
.lb-sub{font-size:10px;color:var(--text2);}

.chart-wrap{padding:10px 12px 8px;}
.chart-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}

.mega-alert{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1c0800,#2d1400);border:2px solid var(--orange);border-radius:14px;padding:16px 24px;z-index:200;text-align:center;box-shadow:0 8px 32px rgba(255,140,0,.3);animation:alertIn .4s ease;min-width:280px;}
@keyframes alertIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.mega-alert-emoji{font-size:32px;margin-bottom:4px;}
.mega-alert-title{font-size:12px;font-weight:800;color:var(--orange);letter-spacing:2px;margin-bottom:4px;}
.mega-alert-name{font-size:20px;font-weight:900;}
.mega-alert-sub{font-size:11px;color:var(--text2);margin-top:4px;}

.confetti{position:fixed;top:-10px;pointer-events:none;z-index:999;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

.status-bar{background:var(--bg);border-top:1px solid var(--border);padding:4px 1.5rem;font-size:11px;color:var(--text2);display:flex;justify-content:space-between;flex-shrink:0;font-family:monospace;}

@media(max-width:900px){.layout{grid-template-columns:1fr;}.sidebar-right{display:none;}.stats-bar{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div class="lang-toggle"><button class="lang-btn active" onclick="setLang('fr')">🇫🇷 FR</button><button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button></div>
<div class="header">
  <div class="header-left">
    <span style="font-size:22px">🔥</span>
    <span class="header-title">StakePulse — High Rollers Live</span>
    <span class="header-sub" id="proxy-status" data-fr="Connexion Firebase..." data-en="Connecting to Firebase..."></span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="badge-live" id="live-badge" style="display:none">LIVE</span>
    <button class="btn btn-ghost" onclick="toggleTheme()">🌙</button>
    <button class="btn btn-blue" onclick="loadAll()" data-fr="↻ Refresh" data-en="↻ Refresh"></button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-box"><div class="stat-value" style="color:var(--blue)" id="s-total">—</div><div class="stat-label" data-fr="HRs vus" data-en="HRs detected"></div></div>
  <div class="stat-box"><div class="stat-value" style="color:var(--orange)" id="s-recent">—</div><div class="stat-label" data-fr="Dernière heure" data-en="Last hour"></div></div>
  <div class="stat-box"><div class="stat-value" style="color:var(--green)" id="s-chats">—</div><div class="stat-label" data-fr="Chats actifs" data-en="Active chats"></div></div>
  <div class="stat-box"><div class="stat-value" style="color:var(--amber)" id="s-top">—</div><div class="stat-label" data-fr="Top joueur" data-en="Top player"></div></div>
  <div class="stat-box"><div class="stat-value" style="color:var(--purple)" id="s-today">—</div><div class="stat-label" data-fr="Aujourd'hui" data-en="Today"></div></div>
</div>

<div class="filters">
  <span class="filter-label" data-fr="Chat :" data-en="Chat:"></span>
  <div class="chat-tabs" id="chat-tabs">
    <div class="chat-tab active" onclick="setChat('all')" data-chat="all">🌍 Tous</div>
  </div>
  <input class="filter-input" id="search-input" placeholder="🔍 Pseudo..." oninput="applyFilters()">
  <span id="filter-count" style="font-size:11px;color:var(--text2);margin-left:auto"></span>
</div>

<div class="layout">
  <div class="feed-panel" id="feed">
    <div class="loader"><div class="spinner"></div><span data-fr="Chargement Firebase..." data-en="Loading from Firebase..."></span></div>
  </div>
  <div class="sidebar-right">
    <div class="widget">
      <div class="widget-header"><span>👑</span><span class="widget-title" data-fr="Top HR" data-en="Top HR"></span><span class="widget-sub" id="lb-sub" data-fr="tous chats" data-en="all chats"></span></div>
      <div class="widget-body" id="lb-body"><div style="padding:16px;text-align:center;font-size:12px;color:var(--text2)">...</div></div>
    </div>
    <div class="widget">
      <div class="widget-header"><span>💬</span><span class="widget-title" data-fr="Activité par chat" data-en="Activity by chat"></span></div>
      <div class="widget-body" id="chat-stats"><div style="padding:16px;text-align:center;font-size:12px;color:var(--text2)">...</div></div>
    </div>
    <div class="widget">
      <div class="chart-wrap">
        <div class="chart-title" data-fr="📊 Activité par heure" data-en="📊 Activity per hour"></div>
        <canvas id="hour-chart" height="120"></canvas>
      </div>
    </div>
    <div class="widget">
      <div class="widget-header"><span>🏆</span><span class="widget-title" data-fr="Records" data-en="Records"></span></div>
      <div class="widget-body" id="records-body"><div style="padding:16px;text-align:center;font-size:12px;color:var(--text2)">...</div></div>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="status-text" data-fr="En attente..." data-en="Waiting..."></span>
  <span id="last-update">—</span>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const PROXY = 'http://localhost:3002';

// Mapping chatId → info (depuis server.js)
const CHAT_MAP = {
  '5a6e5063-0154-47eb-9064-f69547213fe5': {name:'French',    flag:'🇫🇷'},
  'f0326994-ee9e-411c-8439-b4997c187b95': {name:'English',   flag:'🇬🇧'},
  '69b2aa0a-53b6-4eed-ada2-ad1d1f4d5bfe': {name:'Russian',   flag:'🇷🇺'},
  '76609291-6ff5-4d0c-9ed6-0fde1d27de33': {name:'Spanish',   flag:'🇪🇸'},
  '94e807f3-a2fc-4caf-b0ff-ccc613f71879': {name:'German',    flag:'🇩🇪'},
  '8590c8cd-65b2-45bd-ab58-973761efd1c6': {name:'Brazil',    flag:'🇧🇷'},
  '366c04f5-bdea-4415-8e2e-2d6952bf409d': {name:'Portugais', flag:'🇵🇹'},
  '38530077-e0f1-4cf7-8a92-08e9b3c7b63a': {name:'Hindi',     flag:'🇮🇳'},
  'e824dc29-68ea-41a4-b69e-60fe31226e43': {name:'Indonesian',flag:'🇮🇩'},
  '6ceca59c-394a-40e1-a133-0c2999d687bc': {name:'Turkish',   flag:'🇹🇷'},
  '688cf7f9-00d9-4e26-aa4f-bd7cc47e3ae4': {name:'Filipino',  flag:'🇵🇭'},
  'c65b4f32-0001-4e1d-9cd6-e4b3538b43ae': {name:'Japanese',  flag:'🇯🇵'},
  '18f9a83c-0cfb-4c72-8600-23fbe0180e45': {name:'Korean',    flag:'🇰🇷'},
  '81458dff-a653-4e9d-88c8-91b77f99e45b': {name:'Polish',    flag:'🇵🇱'},
  '96deb88b-ced9-4b78-b4da-8a65324c2aff': {name:'Chinese',   flag:'🇨🇳'},
  '8c9994c8-192b-44aa-ac26-f083baf29896': {name:'Vietnamese',flag:'🇻🇳'},
  '2fcc08ba-9a3d-42bc-9265-90da709a4035': {name:'Arabic',    flag:'🇸🇦'},
  'f28dcd36-8325-49fa-aa23-a75045b13efa': {name:'Nigerian',  flag:'🇳🇬'},
  '68bb6e93-f9d6-4a27-875a-3ba28db4fb64': {name:'Pakistan',  flag:'🇵🇰'},
  '2a1c406f-d3af-4f4c-9d24-b57a592bfa78': {name:'Thai',      flag:'🇹🇭'},
  '9bc0ec54-98fb-4a83-9724-b55709eec990': {name:'Intl',      flag:'🌍'},
  '5cba7c13-b384-4c52-ad59-f169b23c62f8': {name:'Sports',    flag:'⚽'},
};

// ── State ──────────────────────────────────────────────────────────────────
let allHRs = [];
let filteredHRs = [];
let activeChat = 'all';
let hourChart = null;
let lastTotal = 0;
let pollTimer = null;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getChatInfo(chatId){return CHAT_MAP[chatId] || {name: chatId?.substring(0,8)||'?', flag:'💬'};}
function timeAgo(ts){
  if(!ts)return '—';
  const lang=document.documentElement.getAttribute('lang')||'fr';
  const d=(Date.now()-ts)/1000;
  if(lang==='en'){
    if(d<60)return 'just now';
    if(d<3600)return `${Math.floor(d/60)}min ago`;
    if(d<86400)return `${Math.floor(d/3600)}h ago`;
    return `${Math.floor(d/86400)}d ago`;
  }
  if(d<60)return 'à l\'instant';
  if(d<3600)return `il y a ${Math.floor(d/60)}min`;
  if(d<86400)return `il y a ${Math.floor(d/3600)}h`;
  return `il y a ${Math.floor(d/86400)}j`;
}
function toggleTheme(){
  const light=document.documentElement.getAttribute('data-theme')==='light';
  document.documentElement.setAttribute('data-theme',light?'dark':'light');
  document.querySelector('[onclick="toggleTheme()"]').textContent=light?'🌙':'☀️';
}

// ── Firebase Load ──────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const r = await fetch(`${PROXY}/highrollers`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    if (!data.ok || !data.highrollers) {
      showEmpty('Aucune donnée HR (server.js en cours de démarrage ?)');
      return;
    }

    const prev = allHRs.length;
    allHRs = data.highrollers;

    // Alerte uniquement si le message contient casino: ou house:
    if (prev > 0 && allHRs.length > prev) {
      allHRs.slice(0, allHRs.length - prev).forEach(hr => {
        const msg = (hr.message || '').toLowerCase();
        if (msg.includes('casino:') || msg.includes('house:')) {
          showMegaAlert(hr);
        }
      });
    }
    lastTotal = allHRs.length;

    document.getElementById('live-badge').style.display = 'flex';
    document.getElementById('proxy-status').innerHTML = `<span style="color:var(--green)">✅ Connecté (${allHRs.length} HRs)</span>`;
    document.getElementById('last-update').textContent = (document.documentElement.getAttribute('lang')||'fr')==='fr'?`Mis à jour ${new Date().toLocaleTimeString('fr-FR')}`:`Updated at ${new Date().toLocaleTimeString('en-GB')}`;
    document.getElementById('status-text').textContent = (document.documentElement.getAttribute('lang')||'fr')==='fr'?`${allHRs.length} high rollers trackés`:`${allHRs.length} high rollers tracked`;

    buildChatTabs();
    applyFilters();
    updateStats();
    updateLeaderboard();
    updateChatStats();
    updateHourChart();
    updateRecords();

  } catch(err) {
    const lang=document.documentElement.getAttribute('lang')||'fr';
    document.getElementById('proxy-status').innerHTML = lang==='fr'?`<span style="color:var(--red)">❌ Proxy hors ligne</span>`:`<span style="color:var(--red)">❌ Proxy offline</span>`;
    document.getElementById('feed').innerHTML = `<div class="empty"><div class="empty-icon">❌</div><p>server.js inaccessible sur le port 3002</p><p style="font-size:12px;color:var(--text2);margin-top:8px">${esc(err.message)}</p></div>`;
  }
}

// ── Filtres ────────────────────────────────────────────────────────────────
function setChat(chatId) {
  activeChat = chatId;
  document.querySelectorAll('.chat-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`[data-chat="${chatId}"]`)?.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('search-input').value.toLowerCase();
  filteredHRs = allHRs.filter(hr => {
    if (activeChat !== 'all' && hr.chatId !== activeChat) return false;
    if (search && !(hr.sender||'').toLowerCase().includes(search) && !(hr.message||'').toLowerCase().includes(search)) return false;
    return true;
  });
  document.getElementById('filter-count').textContent = `${filteredHRs.length} résultats`;
  renderFeed();
}

function buildChatTabs() {
  const chats = [...new Set(allHRs.map(h=>h.chatId).filter(Boolean))];
  let html = `<div class="chat-tab ${activeChat==='all'?'active':''}" onclick="setChat('all')" data-chat="all">🌍 Tous</div>`;
  chats.forEach(chatId => {
    const info = getChatInfo(chatId);
    const isActive = activeChat === chatId;
    html += `<div class="chat-tab ${isActive?'active':''}" onclick="setChat('${esc(chatId)}')" data-chat="${esc(chatId)}">${info.flag} ${info.name}</div>`;
  });
  document.getElementById('chat-tabs').innerHTML = html;
}

// ── Render Feed ────────────────────────────────────────────────────────────
function renderFeed() {
  const feed = document.getElementById('feed');
  if (!filteredHRs.length) {
    feed.innerHTML = `<div class="empty"><div class="empty-icon">🔥</div><p>${(document.documentElement.getAttribute('lang')||'fr')==='fr'?'Aucun high roller pour ce filtre':'No high roller found for this filter'}</p></div>`;
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  const feedLang=document.documentElement.getAttribute('lang')||'fr';
  let html = `<div class="section-title">${feedLang==='fr'?'🔥 High Rollers — feed live':'🔥 High Rollers — live feed'}</div>`;

  filteredHRs.slice(0,150).forEach((hr,i) => {
    const info = getChatInfo(hr.chatId);
    const ago = timeAgo(hr.ts);
    const isNew = (Date.now()-(hr.ts||0)) < 300000;
    const cardLang=document.documentElement.getAttribute('lang')||'fr';
    const initiale = (hr.sender||'?').charAt(0).toUpperCase();
    const msg = (hr.message||'').replace(/Casino:\s*#?/gi,'').trim();

    html += `<div class="hr-card ${i<5?'new':''}">
      <div class="hr-idx">${medals[i]||`#${i+1}`}</div>
      <div class="hr-avatar">${initiale}</div>
      <div class="hr-body">
        <div class="hr-name">${esc(hr.sender||'?')}</div>
        <div class="hr-msg" title="${esc(hr.message||'')}">${esc(msg||hr.message||'—')}</div>
        <div class="hr-meta">
          <span class="hr-chat-tag">${info.flag} ${info.name}</span>
          <span class="hr-time">⏰ ${hr.time||''}  ${ago}</span>
          <span class="hr-badge ${isNew?'recent':'old'}">${isNew?(cardLang==='fr'?'🔴 Récent':'🔴 Recent'):(cardLang==='fr'?'⚫ Ancien':'⚫ Old')}</span>
        </div>
      </div>
    </div>`;
  });

  feed.innerHTML = html;
}

// ── Stats ──────────────────────────────────────────────────────────────────
function updateStats() {
  const now = Date.now();
  const since1h = now - 3600*1000;
  const since24h = now - 86400*1000;
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);

  const recent1h = allHRs.filter(h=>(h.ts||0)>since1h).length;
  const today = allHRs.filter(h=>(h.ts||0)>todayStart.getTime()).length;
  const chats = new Set(allHRs.map(h=>h.chatId).filter(Boolean)).size;

  const counts = {};
  allHRs.forEach(h=>{counts[h.sender||'?']=(counts[h.sender||'?']||0)+1;});
  const topUser = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];

  document.getElementById('s-total').textContent = allHRs.length;
  document.getElementById('s-recent').textContent = recent1h;
  document.getElementById('s-chats').textContent = chats;
  document.getElementById('s-top').textContent = topUser ? topUser[0].substring(0,10) : '—';
  document.getElementById('s-today').textContent = today;
}

// ── Leaderboard ────────────────────────────────────────────────────────────
function updateLeaderboard() {
  const counts = {};
  allHRs.forEach(h => {
    const name = h.sender || '?';
    if (!counts[name]) counts[name] = {name, chatId:h.chatId, count:0};
    counts[name].count++;
  });
  const sorted = Object.values(counts).sort((a,b)=>b.count-a.count).slice(0,10);
  const medals = ['🥇','🥈','🥉'];

  let html = sorted.map((u,i)=>{
    const info = getChatInfo(u.chatId);
    return `<div class="lb-row">
      <span class="lb-rank">${medals[i]||`#${i+1}`}</span>
      <span style="font-size:14px">${info.flag}</span>
      <span class="lb-name">${esc(u.name)}</span>
      <div style="text-align:right">
        <div class="lb-val">${u.count}</div>
        <div class="lb-sub">bets</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('lb-body').innerHTML = html || '<div style="padding:16px;text-align:center;font-size:12px;color:var(--text2)">Aucune donnée</div>';
}

// ── Stats par chat ─────────────────────────────────────────────────────────
function updateChatStats() {
  const chatCounts = {};
  allHRs.forEach(h => {
    const id = h.chatId||'?';
    chatCounts[id] = (chatCounts[id]||0)+1;
  });
  const sorted = Object.entries(chatCounts).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;

  let html = sorted.map(([chatId, count]) => {
    const info = getChatInfo(chatId);
    const pct = Math.round(count/max*100);
    return `<div class="lb-row">
      <span style="font-size:16px">${info.flag}</span>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
          <span class="lb-name">${info.name}</span>
          <span class="lb-val">${count}</span>
        </div>
        <div style="height:3px;background:var(--border);border-radius:2px">
          <div style="height:3px;background:var(--blue);border-radius:2px;width:${pct}%"></div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('chat-stats').innerHTML = html || '<div style="padding:16px;text-align:center;font-size:12px;color:var(--text2)">Aucune donnée</div>';
}

// ── Chart ──────────────────────────────────────────────────────────────────
function updateHourChart() {
  const hours = Array(24).fill(0);
  allHRs.forEach(h => {
    if (!h.ts) return;
    hours[new Date(h.ts).getHours()]++;
  });
  const ctx = document.getElementById('hour-chart');
  if (!ctx) return;
  if (hourChart) hourChart.destroy();
  hourChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: hours.map((_,i)=>`${i}h`),
      datasets: [{data:hours, backgroundColor:'rgba(0,212,255,.4)', borderColor:'#00d4ff', borderWidth:1, borderRadius:3}]
    },
    options: {
      responsive:true,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#3a5a6a',font:{size:9}},grid:{color:'rgba(26,45,61,.5)'}},
        y:{ticks:{color:'#3a5a6a',font:{size:10}},grid:{color:'rgba(26,45,61,.5)'}}
      }
    }
  });
}

// ── Records ────────────────────────────────────────────────────────────────
function updateRecords() {
  if (!allHRs.length) return;

  const counts = {};
  allHRs.forEach(h=>{counts[h.sender||'?']=(counts[h.sender||'?']||0)+1;});
  const mostActive = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];

  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayHRs = allHRs.filter(h=>(h.ts||0)>todayStart.getTime());

  const lastHR = allHRs[0];
  const lastInfo = getChatInfo(lastHR?.chatId);

  const html = `
    <div class="lb-row"><span style="font-size:18px">🏃</span><div style="flex:1"><div style="font-size:10px;color:var(--text2)">${(document.documentElement.getAttribute('lang')||'fr')==='fr'?'Plus actif':'Most active'}</div><div style="font-size:13px;font-weight:700">${esc(mostActive?.[0]||'?')}</div></div><div class="lb-val">${mostActive?.[1]||0} bets</div></div>
    <div class="lb-row"><span style="font-size:18px">📅</span><div style="flex:1"><div style="font-size:10px;color:var(--text2)">${(document.documentElement.getAttribute('lang')||'fr')==='fr'?"Aujourd'hui":'Today'}</div><div style="font-size:13px;font-weight:700">${todayHRs.length} bets</div></div></div>
    <div class="lb-row"><span style="font-size:18px">⚡</span><div style="flex:1"><div style="font-size:10px;color:var(--text2)">${(document.documentElement.getAttribute('lang')||'fr')==='fr'?'Dernier HR':'Last HR'}</div><div style="font-size:13px;font-weight:700">${esc(lastHR?.sender||'?')}</div><div style="font-size:10px;color:var(--text2)">${lastInfo.flag} ${lastInfo.name}</div></div><div class="lb-sub">${timeAgo(lastHR?.ts)}</div></div>
  `;
  document.getElementById('records-body').innerHTML = html;
}

// ── Mega Alert ─────────────────────────────────────────────────────────────
function showMegaAlert(hr) {
  const info = getChatInfo(hr.chatId);
  const el = document.createElement('div');
  el.className = 'mega-alert';
  el.innerHTML = `
    <div class="mega-alert-emoji">🔥</div>
    <div class="mega-alert-title">${(document.documentElement.getAttribute('lang')||'fr')==='fr'?'HIGH ROLLER !':'HIGH ROLLER!'}</div>
    <div class="mega-alert-name">${esc(hr.sender||'?')}</div>
    <div class="mega-alert-sub">${info.flag} ${info.name} · ${hr.time||''}</div>
  `;
  document.body.appendChild(el);
  launchConfetti();
  setTimeout(()=>el.remove(), 5000);
}

function launchConfetti() {
  const colors = ['#00d4ff','#ffd700','#00ff88','#f59e0b','#a855f7'];
  for (let i=0;i<20;i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.cssText = `left:${Math.random()*100}vw;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1+Math.random()}s;animation-delay:${Math.random()*.4}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2000);
  }
}

function showEmpty(msg) {
  document.getElementById('feed').innerHTML = `<div class="empty"><div class="empty-icon">🔥</div><p>${esc(msg)}</p></div>`;
}

// ── Polling ────────────────────────────────────────────────────────────────
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadAll, 10000);
}

function setLang(lang) {
  document.querySelectorAll('[data-fr]').forEach(el => {
    el.textContent = el.getAttribute(`data-${lang}`);
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(lang.toUpperCase()));
  });
  document.documentElement.setAttribute('lang', lang);
  localStorage.setItem('sp_lang', lang);
}

const savedLang = localStorage.getItem('sp_lang') || 'fr';
setLang(savedLang);

loadAll().then(startPolling);
</script>
</body>
</html>
